[pytest]
# Configuración de pytest para el proyecto SDDV

# ═══════════════════════════════════════════════════════════════════════════
# OPCIONES GENERALES
# ═══════════════════════════════════════════════════════════════════════════

# Directorio donde están los tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ═══════════════════════════════════════════════════════════════════════════
# COBERTURA DE CÓDIGO (pytest-cov)
# ═══════════════════════════════════════════════════════════════════════════

addopts =
    # Verbose: mostrar cada test
    -v
    # Mostrar warnings
    --strict-markers
    # Rastreo de duración (tests lentos)
    --durations=10
    # Colorear salida
    --color=yes
    # Cobertura
    --cov=crypto
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=xml
    --cov-branch
    # Parar en primer fallo
    -x

# ─────────────────────────────────────────────────────────────────────────
# UMBRAL MÍNIMO DE COBERTURA
# Si la cobertura cae por debajo del 80%, el test falla
# ─────────────────────────────────────────────────────────────────────────
# Comentado por ahora; descomenta cuando sea necesario:
# [coverage:run]
# branch = True
# 
# [coverage:report]
# fail_under = 80
# precision = 2
# skip_covered = False

# ═══════════════════════════════════════════════════════════════════════════
# MARCADORES PERSONALIZADOS
# ═══════════════════════════════════════════════════════════════════════════

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    security: marks tests as security-related
    roundtrip: marks tests as encryption/decryption roundtrip tests
    manipulation: marks tests that verify tamper detection
    aes_gcm: marks tests that use AES-256-GCM
    chacha20: marks tests that use ChaCha20-Poly1305

# ═══════════════════════════════════════════════════════════════════════════
# MODO MINIMALISTA (para CI)
# ═══════════════════════════════════════════════════════════════════════════

# En CI, podrías usar: pytest -m "not slow" para saltar tests lentos
# o: pytest --tb=short para reportes más cortos

# ═══════════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════════

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ═══════════════════════════════════════════════════════════════════════════
# TIMEOUT PARA TESTS (si usas pytest-timeout)
# ═══════════════════════════════════════════════════════════════════════════

# timeout = 300  # segundos
