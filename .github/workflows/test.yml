name: Tests AEAD

on:
  push:
    branches:
      - feature/ci-cd-automated-testing
    paths:
      - 'crypto/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
      - 'requirements*.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install cryptography pytest
      - run: python -m pytest tests/test_aead.py -v

