name: Tests Automatizados AEAD

on:
  # ═══════════════════════════════════════════════════════════════════════════
  # SOLO se ejecuta en Pull Requests hacia main
  # (NO en push directo a main para mantener main estable)
  # ═══════════════════════════════════════════════════════════════════════════
  pull_request:
    branches: [ main ]
    paths:
      - 'crypto/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
      - 'requirements*.txt'
  
  # También se ejecuta en push a ramas de feature/develop (mientras las trabajas)
  push:
    branches:
      - 'feature/**'
      - 'develop'
      - 'test/**'
    paths:
      - 'crypto/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
      - 'requirements*.txt'
  
  # Permite ejecutar manualmente desde Actions tab en GitHub
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1: TESTS UNITARIOS CON MÚLTIPLES VERSIONES DE PYTHON
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Tests | Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Si un test falla en una versión, sigue ejecutando en otras (no para todo)
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      # ─────────────────────────────────────────────────────────────────────
      # 1. Descargar el código del repositorio
      # ─────────────────────────────────────────────────────────────────────
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Descarga todo el historial (para reportes de cambios)

      # ─────────────────────────────────────────────────────────────────────
      # 2. Configurar Python versión específica
      # ─────────────────────────────────────────────────────────────────────
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # Cachear dependencias entre ejecuciones
      
      # ─────────────────────────────────────────────────────────────────────
      # 3. Mostrar versión de Python (debug)
      # ─────────────────────────────────────────────────────────────────────
      - name: Mostrar versión de Python
        run: python --version

      # ─────────────────────────────────────────────────────────────────────
      # 4. Instalar dependencias de tests
      # ─────────────────────────────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install cryptography pytest pytest-cov pytest-xdist

      # ─────────────────────────────────────────────────────────────────────
      # 5. Ejecutar tests unitarios CON COBERTURA
      # ─────────────────────────────────────────────────────────────────────
      - name: Ejecutar tests (pytest)
        run: |
          pytest tests/test_aead.py \
            -v \
            --tb=short \
            --cov=crypto \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            -x
        continue-on-error: false

      # ─────────────────────────────────────────────────────────────────────
      # 6. Generar reporte de cobertura en Markdown para PR
      # ─────────────────────────────────────────────────────────────────────
      - name: Generar reporte de cobertura
        if: always()
        run: |
          pip install coverage-badge
          coverage-badge -o coverage.svg -f

      # ─────────────────────────────────────────────────────────────────────
      # 7. Subir reporte de cobertura como artifact
      # ─────────────────────────────────────────────────────────────────────
      - name: Guardar reportes de cobertura
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-py${{ matrix.python-version }}-${{ matrix.os }}
          path: |
            htmlcov/
            coverage.xml
            coverage.svg
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2: ANÁLISIS ESTÁTICO (LINTING)
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar herramientas de linting
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort

      # ─────────────────────────────────────────────────────────────────────
      # Verificar formato con black (sin modificar archivos)
      # ─────────────────────────────────────────────────────────────────────
      - name: Verificar formato (black)
        run: |
          black --check crypto/ tests/ || echo "⚠️  Archivos con formato incorrecto (use: black crypto/ tests/)"
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────────────
      # Verificar orden de imports (isort)
      # ─────────────────────────────────────────────────────────────────────
      - name: Verificar orden de imports (isort)
        run: |
          isort --check-only crypto/ tests/ || echo "⚠️  Imports desordenados (use: isort crypto/ tests/)"
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────────────
      # Linting con flake8 (PEP 8)
      # ─────────────────────────────────────────────────────────────────────
      - name: Linting (flake8)
        run: |
          flake8 crypto/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --count \
            --statistics
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3: VERIFICACIÓN DE SEGURIDAD (BANDIT)
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Check (Bandit)
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      # ─────────────────────────────────────────────────────────────────────
      # Escanear código por vulnerabilidades de seguridad
      # ─────────────────────────────────────────────────────────────────────
      - name: Ejecutar Bandit
        run: |
          bandit -r crypto/ \
            -f json \
            -o bandit-report.json || true
        continue-on-error: true

      - name: Mostrar resultado de Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]
          bandit -r crypto/ -f txt

      - name: Guardar reporte de seguridad
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4: REPORTE FINAL (Resume todos los resultados)
  # ═══════════════════════════════════════════════════════════════════════════
  report:
    name: Reporte Final
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: always()
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Crear resumen
        run: |
          echo "## ✅ Resumen de CI/CD" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Versions probadas: Python 3.10, 3.11, 3.12" >> $GITHUB_STEP_SUMMARY
          echo "- Plataformas: Ubuntu, Windows, macOS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Linting" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Seguridad" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage reports disponibles" >> $GITHUB_STEP_SUMMARY
          echo "- Security reports disponibles" >> $GITHUB_STEP_SUMMARY

      - name: Fallar si tests no pasaron
        if: needs.test.result != 'success'
        run: exit 1
