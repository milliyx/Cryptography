name: Tests AEAD

on:
  push:
    branches:
      - feature/ci-cd-automated-testing
    paths:
      - 'crypto/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
      - 'requirements*.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install cryptography pytest pytest-cov
      - run: python -m pytest tests/test_aead.py -v

  report:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Mostrar resultado
        run: |
          echo "Tests result: ${{ needs.test.result }}"
          if [ "${{ needs.test.result }}" != "success" ]; then exit 1; fi

